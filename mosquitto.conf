# ─── Configuración de Mosquitto MQTT ────────────────────────────────────────
# Puerto estándar MQTT
listener 1883 0.0.0.0

# Permitir conexiones sin usuario/contraseña (red local, sin exposición exterior)
allow_anonymous true

# Persistencia de mensajes
persistence true
persistence_location /mosquitto/data/

# Logs
log_dest stdout
log_type error
log_type warning
log_type notice

# Máximo de conexiones simultáneas
max_connections -1

# Message timeout
message_size_limit 0
